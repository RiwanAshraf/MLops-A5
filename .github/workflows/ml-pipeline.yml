name: Gatekeeper Pipeline

on:
  push:
    branches:
      - main

jobs:

  linter:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.check.outputs.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Simple Lint Check
        id: check
        run: |
          echo "Running linter..."
          echo "status=success" >> $GITHUB_OUTPUT


  train:
    needs: linter
    runs-on: ubuntu-latest

    if: |
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]') &&
      needs.linter.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train Model
        run: |
          python train.py

      - name: Save model info
        run: |
          echo "${{ github.run_id }}" > model_info.txt

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt


  failure_handler:
    runs-on: ubuntu-latest
    needs: train
    if: failure()

    steps:
      - name: Create error logs
        run: |
          echo "Training failed. Investigate logs." > error_logs.txt

      - name: Upload error logs
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt


  cleanup:
    runs-on: ubuntu-latest
    needs: [linter, train]
    if: always()

    steps:
      - name: Cleanup step
        run: |
          echo "Cleaning up temporary cloud volumes..."